# Training hyperparameters (Phases 3–5: fine-tuning)
# For DAPT config, see DAPTConfig in synoptiq/training/_config.py

# Optimization
learning_rate: 5.0e-5
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
weight_decay: 0.01
max_grad_norm: 1.0

# Scheduling
warmup_steps: 1000
scheduler: cosine
num_cycles: 0.5

# Steps
max_steps: 100000
eval_steps: 500
save_steps: 2000
logging_steps: 50

# Batch
batch_size: 8
gradient_accumulation_steps: 4   # Effective batch size = 32

# Early stopping
early_stopping_patience: 10
early_stopping_metric: val_loss
early_stopping_mode: min

# Mixed precision (fp16 on GPU)
use_amp: true
